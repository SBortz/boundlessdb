<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boundless DCB Event Store - Interactive Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      line-height: 1.4;
      height: 100vh;
      overflow: hidden;
    }
    
    /* 3-Column Layout */
    .layout {
      display: grid;
      grid-template-columns: 420px 1fr 340px;
      height: 100vh;
    }
    
    /* Mobile Tabs - hidden on desktop */
    .mobile-tabs {
      display: none;
    }
    
    /* Left: Controls */
    .controls {
      padding: 0.75rem;
      overflow-y: auto;
      border-right: 1px solid #0f3460;
    }
    
    /* Center: Live Query */
    .live-query {
      display: flex;
      flex-direction: column;
      border-right: 1px solid #0f3460;
    }
    
    .live-query-header {
      padding: 0.75rem;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
    }
    
    .live-query-content {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem;
    }
    
    /* Right: Event Log */
    .sidebar {
      background: #0d1929;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    
    .sidebar-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      border-bottom: 1px solid #0f3460;
    }
    .sidebar-section:last-child { border-bottom: none; }
    
    .sidebar-header {
      padding: 0.4rem 0.6rem;
      background: #16213e;
      font-size: 0.85rem;
      font-weight: 600;
      color: #0cf;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sidebar-header button {
      padding: 0.15rem 0.4rem;
      font-size: 0.7rem;
      margin: 0;
    }
    
    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      font-size: 0.75rem;
    }
    
    h1 { color: #0ff; margin-bottom: 0.75rem; font-size: 1.1rem; }
    h2 { color: #0cf; margin-bottom: 0.4rem; font-size: 0.9rem; border-bottom: 1px solid #333; padding-bottom: 0.25rem; }
    h3 { color: #0cf; font-size: 0.85rem; margin-bottom: 0.3rem; }
    
    .panel {
      background: #16213e;
      border-radius: 6px;
      padding: 0.6rem;
      border: 1px solid #0f3460;
      margin-bottom: 0.6rem;
    }
    
    label { display: block; margin-top: 0.3rem; color: #aaa; font-size: 0.75rem; }
    input, textarea, select {
      width: 100%;
      padding: 0.35rem;
      background: #0f3460;
      border: 1px solid #1e5f74;
      border-radius: 4px;
      color: #fff;
      font-family: 'Fira Code', monospace;
      font-size: 0.8rem;
    }
    textarea { min-height: 100px; resize: vertical; }
    button {
      margin-top: 0.35rem;
      padding: 0.35rem 0.7rem;
      background: #0f4c75;
      border: none;
      border-radius: 4px;
      color: #fff;
      cursor: pointer;
      font-size: 0.8rem;
    }
    button:hover { background: #1e5f74; }
    button.success { background: #2a6; }
    button.success:hover { background: #3b7; }
    button.danger { background: #a44; }
    button.danger:hover { background: #b55; }
    button.query { background: #06a; }
    button.query:hover { background: #17b; }
    button.active { background: #0a8; box-shadow: 0 0 8px #0a8; }
    button.scenario { background: #704; }
    button.scenario:hover { background: #915; }
    
    .toggle {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 0.3rem;
    }
    .toggle input { width: auto; }
    
    .result {
      margin-top: 0.4rem;
      padding: 0.4rem;
      background: #0a1628;
      border-radius: 4px;
      font-family: 'Fira Code', monospace;
      font-size: 0.7rem;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 120px;
      overflow-y: auto;
    }
    .result.success { border-left: 3px solid #0f0; }
    .result.error { border-left: 3px solid #f00; }
    .result.conflict { border-left: 3px solid #fa0; }
    
    /* Feedback Messages */
    .feedback {
      padding: 0.5rem;
      border-radius: 4px;
      font-size: 0.85rem;
      margin-top: 0.4rem;
    }
    .feedback.success {
      background: rgba(0, 255, 100, 0.15);
      border: 1px solid #0f6;
      color: #0f6;
    }
    .feedback.conflict {
      background: rgba(255, 170, 0, 0.15);
      border: 1px solid #fa0;
      color: #fa0;
    }
    .feedback.info {
      background: rgba(0, 200, 255, 0.15);
      border: 1px solid #0cf;
      color: #0cf;
    }
    
    .condition-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 0.25rem;
      margin-bottom: 0.25rem;
    }
    .condition-row input { margin: 0; font-size: 0.75rem; padding: 0.3rem; }
    .condition-row button { margin: 0; padding: 0.3rem; font-size: 0.75rem; }
    
    .keys-row {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 0.25rem;
      margin-bottom: 0.25rem;
    }
    .keys-row input { font-size: 0.75rem; padding: 0.3rem; }
    
    .token-display {
      background: #0a1628;
      padding: 0.25rem 0.4rem;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.65rem;
      cursor: pointer;
      word-break: break-all;
      max-height: 50px;
      overflow-y: auto;
    }
    .token-display:hover { background: #1a2638; }
    
    .status {
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      font-size: 0.7rem;
    }
    .status.connected { background: #0a4; color: #fff; }
    .status.disconnected { background: #a00; color: #fff; }
    .status.loading { background: #a70; color: #fff; }
    
    /* Collapsible Advanced Section */
    .collapsible-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }
    .collapsible-header:hover { opacity: 0.8; }
    .collapsible-toggle {
      font-size: 0.75rem;
      color: #0cf;
      background: none;
      border: 1px solid #0cf;
      padding: 0.2rem 0.5rem;
      margin: 0;
    }
    .collapsible-content {
      display: none;
    }
    .collapsible-content.open {
      display: block;
    }
    
    /* Event List Styles */
    .event-item {
      padding: 0.4rem 0.6rem;
      border-bottom: 1px solid #1a2a4a;
    }
    .event-item:hover { background: rgba(255,255,255,0.03); }
    
    .event-pos {
      font-weight: bold;
      color: #0cf;
      font-size: 0.7rem;
    }
    .event-type {
      color: #ff9e64;
      font-weight: 500;
    }
    .event-time {
      color: #666;
      font-size: 0.65rem;
      float: right;
    }
    .event-data {
      color: #888;
      font-size: 0.65rem;
      font-family: monospace;
      margin-top: 0.15rem;
      word-break: break-all;
    }
    
    .key-item {
      padding: 0.25rem 0.6rem;
      border-bottom: 1px solid #1a2a4a;
      display: grid;
      grid-template-columns: 35px 1fr;
      gap: 0.4rem;
      font-size: 0.7rem;
    }
    .key-pos { color: #0cf; }
    .key-name { color: #9ece6a; }
    .key-value { color: #bb9af7; }
    
    /* Quick Actions */
    .quick-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-top: 0.3rem;
    }
    .quick-buttons button {
      margin: 0;
      font-size: 0.7rem;
      padding: 0.25rem 0.5rem;
    }
    
    /* Scenario Buttons */
    .scenario-buttons {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .scenario-buttons button {
      flex: 1;
      padding: 0.6rem;
      font-size: 0.85rem;
      margin: 0;
    }
    
    /* Live Query */
    .query-presets {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-bottom: 0.5rem;
    }
    .query-presets button {
      margin: 0;
      font-size: 0.75rem;
      padding: 0.3rem 0.6rem;
    }
    
    .live-event-card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 6px;
      padding: 0.6rem;
      margin-bottom: 0.5rem;
    }
    .live-event-card .pos { color: #0cf; font-weight: bold; }
    .live-event-card .type { color: #ff9e64; font-size: 0.9rem; }
    .live-event-card .time { color: #666; font-size: 0.7rem; float: right; }
    .live-event-card .data { 
      color: #aaa; 
      font-size: 0.75rem; 
      font-family: monospace;
      margin-top: 0.3rem;
      background: #0a1628;
      padding: 0.4rem;
      border-radius: 4px;
      white-space: pre-wrap;
    }
    .live-event-card .keys {
      margin-top: 0.3rem;
      font-size: 0.7rem;
    }
    .live-event-card .keys span {
      display: inline-block;
      background: #0f3460;
      padding: 0.15rem 0.4rem;
      border-radius: 3px;
      margin-right: 0.3rem;
      margin-top: 0.2rem;
    }
    .live-event-card .keys .kn { color: #9ece6a; }
    .live-event-card .keys .kv { color: #bb9af7; }
    
    .live-query-stats {
      background: #0f3460;
      padding: 0.4rem 0.6rem;
      border-radius: 4px;
      margin-bottom: 0.5rem;
      font-size: 0.8rem;
      display: flex;
      justify-content: space-between;
    }
    .live-query-stats .count { color: #0cf; font-weight: bold; }
    .live-query-stats .token { color: #666; font-size: 0.65rem; cursor: pointer; }
    .live-query-stats .token:hover { color: #aaa; }
    
    .back-link {
      display: inline-block;
      color: #0cf;
      text-decoration: none;
      font-size: 0.85rem;
      margin-bottom: 0.5rem;
    }
    .back-link:hover { text-decoration: underline; }
    
    .browser-badge {
      display: inline-block;
      background: linear-gradient(90deg, #0f4c75, #1e5f74);
      color: #0cf;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-size: 0.7rem;
      margin-left: 0.5rem;
    }
    
    /* ==================== MOBILE STYLES ==================== */
    @media (max-width: 768px) {
      body {
        overflow: auto;
        height: auto;
      }
      
      .layout {
        display: block;
        height: auto;
      }
      
      /* Mobile Tab Navigation */
      .mobile-tabs {
        display: flex;
        position: sticky;
        top: 0;
        z-index: 100;
        background: #0d1929;
        border-bottom: 2px solid #0f3460;
      }
      
      .mobile-tab {
        flex: 1;
        padding: 0.8rem 0.5rem;
        text-align: center;
        background: #16213e;
        border: none;
        color: #888;
        font-size: 0.8rem;
        cursor: pointer;
        margin: 0;
        border-radius: 0;
      }
      .mobile-tab:hover {
        background: #1e2f4e;
      }
      .mobile-tab.active {
        background: #0f4c75;
        color: #fff;
        border-bottom: 2px solid #0cf;
      }
      
      /* Hide non-active sections */
      .controls,
      .live-query,
      .sidebar {
        display: none;
        border: none;
        height: auto;
        max-height: none;
      }
      
      .controls.mobile-active,
      .live-query.mobile-active,
      .sidebar.mobile-active {
        display: block;
      }
      
      .sidebar.mobile-active {
        display: flex;
        flex-direction: column;
        min-height: 80vh;
      }
      
      /* Touch-friendly buttons */
      button {
        min-height: 44px;
        padding: 0.5rem 1rem;
        font-size: 0.9rem;
      }
      
      .quick-buttons button {
        min-height: 44px;
        padding: 0.5rem 0.8rem;
        font-size: 0.85rem;
      }
      
      .scenario-buttons button {
        min-height: 50px;
        font-size: 1rem;
      }
      
      .query-presets button {
        min-height: 44px;
        padding: 0.5rem 0.8rem;
      }
      
      .condition-row button {
        min-height: 40px;
        padding: 0.4rem;
      }
      
      /* Adjust inputs for touch */
      input, textarea, select {
        min-height: 44px;
        padding: 0.5rem;
        font-size: 16px; /* Prevents iOS zoom */
      }
      
      /* Stack condition row on mobile */
      .condition-row {
        grid-template-columns: 1fr 1fr;
        gap: 0.3rem;
      }
      .condition-row input:first-child {
        grid-column: span 2;
      }
      
      /* Sidebar sections full height */
      .sidebar-section {
        min-height: 40vh;
      }
      
      /* Larger touch targets in lists */
      .event-item {
        padding: 0.6rem;
      }
      .key-item {
        padding: 0.5rem 0.6rem;
      }
      
      /* Hide back link on mobile to save space */
      .back-link {
        display: none;
      }
      
      h1 {
        font-size: 1rem;
      }
      
      .browser-badge {
        display: none;
      }
      
      .mobile-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.5rem;
        background: #0d1929;
        border-bottom: 1px solid #0f3460;
      }
      
      .mobile-header h1 {
        margin: 0;
        font-size: 1rem;
      }
    }
    
    /* Desktop: hide mobile header */
    @media (min-width: 769px) {
      .mobile-header {
        display: none;
      }
    }
  </style>
</head>
<body>
  <!-- Mobile Header -->
  <div class="mobile-header">
    <h1>🗃️ Boundless Demo</h1>
    <span id="mobile-status" class="status loading">⏳</span>
  </div>
  
  <!-- Mobile Tab Navigation -->
  <div class="mobile-tabs">
    <button class="mobile-tab active" onclick="showMobileTab('controls')">⚡ Actions</button>
    <button class="mobile-tab" onclick="showMobileTab('live-query')">🔍 Query</button>
    <button class="mobile-tab" onclick="showMobileTab('sidebar')">📊 Log</button>
  </div>
  
  <div class="layout">
    <!-- Left: Controls -->
    <div class="controls mobile-active" id="section-controls">
      <a href="/" class="back-link">← Back to Home</a>
      <h1>🗃️ Boundless Demo <span class="browser-badge">100% Client-Side</span></h1>
      
      <!-- Guided Demo Scenarios -->
      <div class="panel">
        <h2>🎬 Guided Demo</h2>
        <p style="font-size:0.75rem;color:#888;margin-bottom:0.5rem">
          Klicke um automatisch Szenarien zu demonstrieren:
        </p>
        <div class="scenario-buttons">
          <button class="success" onclick="runNormalFlowDemo()">▶️ Normal Flow</button>
          <button class="scenario" onclick="runShowConflictDemo()">▶️ Show Conflict</button>
        </div>
        <div id="scenario-result" class="feedback" style="display:none"></div>
      </div>
      
      <!-- Quick Actions -->
      <div class="panel">
        <h2>🚀 Quick Actions</h2>
        
        <div class="quick-buttons">
          <button class="success" onclick="quickAction('CourseCreated', {courseId:'cs101',name:'Intro to CS',capacity:30})">📚 CS101</button>
          <button class="success" onclick="quickAction('CourseCreated', {courseId:'math201',name:'Linear Algebra',capacity:25})">📚 MATH201</button>
        </div>
        
        <div class="quick-buttons">
          <button onclick="quickAction('StudentSubscribed', {courseId:'cs101',studentId:'alice',name:'Alice'})">👩‍🎓 Alice→CS</button>
          <button onclick="quickAction('StudentSubscribed', {courseId:'cs101',studentId:'bob',name:'Bob'})">👨‍🎓 Bob→CS</button>
          <button onclick="quickAction('StudentSubscribed', {courseId:'cs101',studentId:'carol',name:'Carol'})">👩‍🎓 Carol→CS</button>
          <button onclick="quickAction('StudentSubscribed', {courseId:'math201',studentId:'alice',name:'Alice'})">👩‍🎓 Alice→M</button>
        </div>
        
        <div class="quick-buttons">
          <button class="danger" onclick="quickAction('StudentUnsubscribed', {courseId:'cs101',studentId:'bob'})">❌ Bob</button>
          <button class="danger" onclick="quickAction('StudentUnsubscribed', {courseId:'cs101',studentId:'alice'})">❌ Alice</button>
        </div>
        
        <div id="quick-result" class="feedback" style="display:none"></div>
      </div>
      
      <!-- Manual Append - Collapsed by default -->
      <div class="panel">
        <div class="collapsible-header" onclick="toggleAdvanced()">
          <h2 style="margin:0;border:none;padding:0">📝 Advanced: Manual Append</h2>
          <button class="collapsible-toggle" id="advanced-toggle">Show ▼</button>
        </div>
        
        <div class="collapsible-content" id="advanced-content">
          <label>Type</label>
          <input type="text" id="append-type" placeholder="StudentSubscribed">
          
          <label>Data</label>
          <textarea id="append-data" style="min-height:120px" placeholder='{"courseId": "cs101", "studentId": "dave"}'></textarea>
          
          <div style="margin-top:0.5rem;padding:0.4rem;background:#0a1628;border-radius:4px;font-size:0.75rem">
            <div style="color:#0cf;margin-bottom:0.3rem">🔐 Consistency Token (editierbar)</div>
            <div id="token-editor">
              <textarea id="token-payload" style="min-height:180px;font-size:0.75rem" placeholder="Klicke 'From Live Query' um Token zu laden"></textarea>
              <div class="quick-buttons" style="margin-top:0.3rem">
                <button class="query" onclick="loadFromLiveQuery()">📋 From Live Query</button>
                <button onclick="clearAppendToken()">🗑️ Clear</button>
              </div>
              <div id="token-status" style="margin-top:0.3rem;color:#888"></div>
            </div>
          </div>
          
          <button onclick="appendEvent()" style="width:100%;margin-top:0.5rem">Append</button>
          <div id="append-result" class="feedback" style="display:none"></div>
        </div>
      </div>
    </div>
    
    <!-- Center: Live Query -->
    <div class="live-query" id="section-live-query">
      <div class="live-query-header">
        <h3>🔍 Live Query</h3>
        
        <div class="query-presets">
          <button class="query active" onclick="setLiveQuery([{type:'CourseCreated',key:'course',value:'cs101'},{type:'StudentSubscribed',key:'course',value:'cs101'},{type:'StudentUnsubscribed',key:'course',value:'cs101'}], this)">CS101</button>
          <button class="query" onclick="setLiveQuery([{type:'CourseCreated',key:'course',value:'math201'},{type:'StudentSubscribed',key:'course',value:'math201'},{type:'StudentUnsubscribed',key:'course',value:'math201'}], this)">MATH201</button>
          <button class="query" onclick="setLiveQuery([{type:'StudentSubscribed',key:'student',value:'alice'},{type:'StudentUnsubscribed',key:'student',value:'alice'}], this)">Alice</button>
          <button class="query" onclick="setLiveQuery([{type:'StudentSubscribed',key:'student',value:'bob'},{type:'StudentUnsubscribed',key:'student',value:'bob'}], this)">Bob</button>
        </div>
        
        <div id="live-conditions">
          <div class="condition-row">
            <input type="text" placeholder="Type" class="cond-type" value="CourseCreated">
            <input type="text" placeholder="Key" class="cond-key" value="course">
            <input type="text" placeholder="Value" class="cond-value" value="cs101">
            <button onclick="addLiveConditionRow()">+</button>
          </div>
          <div class="condition-row">
            <input type="text" placeholder="Type" class="cond-type" value="StudentSubscribed">
            <input type="text" placeholder="Key" class="cond-key" value="course">
            <input type="text" placeholder="Value" class="cond-value" value="cs101">
            <button onclick="this.parentElement.remove(); refreshLiveQuery()">-</button>
          </div>
          <div class="condition-row">
            <input type="text" placeholder="Type" class="cond-type" value="StudentUnsubscribed">
            <input type="text" placeholder="Key" class="cond-key" value="course">
            <input type="text" placeholder="Value" class="cond-value" value="cs101">
            <button onclick="this.parentElement.remove(); refreshLiveQuery()">-</button>
          </div>
        </div>
        <button onclick="refreshLiveQuery()" style="width:100%">🔄 Refresh Query</button>
      </div>
      
      <div class="live-query-content" id="live-query-results">
        <div class="live-query-stats">
          <span><span class="count" id="live-count">0</span> events</span>
          <span class="token" id="live-token" onclick="copyLiveToken()">Token: —</span>
        </div>
        <div id="live-events"></div>
      </div>
    </div>
    
    <!-- Right: Event Log -->
    <div class="sidebar" id="section-sidebar">
      <div class="sidebar-section" style="flex:2">
        <div class="sidebar-header">
          📊 All Events
          <div>
            <span id="status" class="status loading">⏳ Loading...</span>
            <button onclick="clearStore()">Clear</button>
          </div>
        </div>
        <div class="sidebar-content" id="events-list"></div>
      </div>
      
      <div class="sidebar-section" style="flex:1">
        <div class="sidebar-header">🔑 All Keys</div>
        <div class="sidebar-content" id="keys-list"></div>
      </div>
    </div>
  </div>
  
  <script type="module">
    // Import Boundless browser bundle
    import { 
      createEventStore, 
      SqlJsStorage, 
      isConflict 
    } from './boundless.browser.js?v=2';

    // Configuration for the demo
    const DEMO_SECRET = 'demo-secret-key-for-hmac-signing';
    const CONSISTENCY_CONFIG = {
      eventTypes: {
        CourseCreated: {
          keys: [
            { name: 'course', path: 'courseId' }
          ]
        },
        StudentSubscribed: {
          keys: [
            { name: 'course', path: 'courseId' },
            { name: 'student', path: 'studentId' }
          ]
        },
        StudentUnsubscribed: {
          keys: [
            { name: 'course', path: 'courseId' },
            { name: 'student', path: 'studentId' }
          ]
        }
      }
    };

    // Global store instance
    let store = null;
    let storage = null;

    // Live Query State
    let currentLiveToken = null;
    let currentLiveConditions = [
      {type:'CourseCreated',key:'course',value:'cs101'},
      {type:'StudentSubscribed',key:'course',value:'cs101'},
      {type:'StudentUnsubscribed',key:'course',value:'cs101'}
    ];

    // Mobile Tab Handling
    window.showMobileTab = function(section) {
      // Update tabs
      document.querySelectorAll('.mobile-tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      
      // Update sections
      document.querySelectorAll('.controls, .live-query, .sidebar').forEach(s => {
        s.classList.remove('mobile-active');
      });
      document.getElementById('section-' + section).classList.add('mobile-active');
    };

    // Advanced section toggle
    window.toggleAdvanced = function() {
      const content = document.getElementById('advanced-content');
      const toggle = document.getElementById('advanced-toggle');
      content.classList.toggle('open');
      toggle.textContent = content.classList.contains('open') ? 'Hide ▲' : 'Show ▼';
    };

    // Initialize the store
    async function initStore() {
      console.log('🚀 Initializing Boundless with sql.js...');
      updateStatus('⏳ Loading sql.js...', 'loading');

      try {
        // Create sql.js storage (in-browser SQLite)
        storage = new SqlJsStorage({
          wasmUrl: 'https://sql.js.org/dist/sql-wasm.wasm'
        });

        // Create the event store
        store = createEventStore({
          storage,
          secret: DEMO_SECRET,
          consistency: CONSISTENCY_CONFIG
        });

        // Wait for initialization
        await store.read({ conditions: [] });

        updateStatus('✓ Ready', 'connected');
        console.log('✅ Boundless ready!');

        // Initial refresh
        await refreshAll();
        await refreshLiveQuery();

      } catch (error) {
        console.error('Failed to initialize:', error);
        updateStatus('✗ Error', 'disconnected');
      }
    }

    function updateStatus(text, className) {
      const status = document.getElementById('status');
      const mobileStatus = document.getElementById('mobile-status');
      status.textContent = text;
      status.className = 'status ' + className;
      if (mobileStatus) {
        mobileStatus.textContent = text.substring(0, 10);
        mobileStatus.className = 'status ' + className;
      }
    }

    async function refreshAll() {
      await Promise.all([refreshEvents(), refreshKeys()]);
    }

    async function refreshEvents() {
      if (!storage) return;
      
      try {
        const events = await storage.getAllEvents();
        const list = document.getElementById('events-list');
        const reversed = [...events].reverse(); // newest first
        list.innerHTML = reversed.map(e => `
          <div class="event-item">
            <span class="event-pos">#${e.position}</span>
            <span class="event-type">${e.type}</span>
            <span class="event-time">${new Date(e.timestamp).toLocaleTimeString()}</span>
            <div class="event-data">${JSON.stringify(e.data)}</div>
          </div>
        `).join('') || '<div style="padding:1rem;color:#666">No events yet</div>';
      } catch (err) {
        console.error('Failed to refresh events:', err);
      }
    }

    async function refreshKeys() {
      if (!storage) return;
      
      try {
        const keys = await storage.getAllKeys();
        const list = document.getElementById('keys-list');
        const reversed = [...keys].reverse(); // newest first
        list.innerHTML = reversed.map(k => `
          <div class="key-item">
            <span class="key-pos">#${k.position}</span>
            <span><span class="key-name">${k.key_name}</span>: <span class="key-value">${k.key_value}</span></span>
          </div>
        `).join('') || '<div style="padding:1rem;color:#666">No keys yet</div>';
      } catch (err) {
        console.error('Failed to refresh keys:', err);
      }
    }

    // ==================== GUIDED DEMO SCENARIOS ====================
    
    // Normal Flow Demo
    window.runNormalFlowDemo = async function() {
      if (!store) {
        showScenarioResult('❌ Store not initialized', 'conflict');
        return;
      }
      
      showScenarioResult('🔄 Step 1/3: Reading CS101 current state...', 'info');
      await sleep(600);
      
      // Step 1: Read current state
      const readResult = await store.read({
        conditions: [
          {type:'CourseCreated', key:'course', value:'cs101'},
          {type:'StudentSubscribed', key:'course', value:'cs101'}
        ]
      });
      const token = readResult.token;
      
      showScenarioResult(`🔄 Step 2/3: Read ${readResult.events.length} events. Token erhalten. Appending...`, 'info');
      await sleep(600);
      
      // Step 2: Append with valid token
      const appendResult = await store.append(
        [{ type: 'StudentSubscribed', data: { courseId: 'cs101', studentId: 'demo-' + Date.now(), name: 'Demo Student' } }],
        token
      );
      
      await refreshAll();
      await refreshLiveQuery();
      
      if (isConflict(appendResult)) {
        showScenarioResult(`⚠️ Unerwarteter Conflict! Jemand anderes hat gleichzeitig geschrieben.`, 'conflict');
      } else {
        showScenarioResult(`✅ Event #${appendResult.position} erfolgreich gespeichert!\n\nNormaler Flow: Read → Token → Append → Success`, 'success');
      }
    };
    
    // Show Conflict Demo
    window.runShowConflictDemo = async function() {
      if (!store) {
        showScenarioResult('❌ Store not initialized', 'conflict');
        return;
      }
      
      showScenarioResult('🔄 Step 1/4: Du liest CS101...', 'info');
      await sleep(600);
      
      // Step 1: Read current state
      const readResult = await store.read({
        conditions: [
          {type:'CourseCreated', key:'course', value:'cs101'},
          {type:'StudentSubscribed', key:'course', value:'cs101'}
        ]
      });
      const oldToken = readResult.token;
      const posAtRead = readResult.events.length > 0 
        ? Math.max(...readResult.events.map(e => e.position))
        : 0;
      
      showScenarioResult(`🔄 Step 2/4: Du hast ${readResult.events.length} Events gelesen (bis #${posAtRead}).\nWährend du nachdenkst, schreibt jemand anderes...`, 'info');
      await sleep(1000);
      
      // Step 2: Concurrent user writes
      const concurrentResult = await store.append(
        [{ type: 'StudentSubscribed', data: { courseId: 'cs101', studentId: 'concurrent-' + Date.now(), name: 'Concurrent User' } }],
        null // No token - direct write
      );
      await refreshAll();
      
      showScenarioResult(`🔄 Step 3/4: Event #${concurrentResult.position} kam dazwischen!\nDu versuchst jetzt mit altem Token zu schreiben...`, 'info');
      await sleep(800);
      
      // Step 3: Try to append with old token
      const appendResult = await store.append(
        [{ type: 'StudentSubscribed', data: { courseId: 'cs101', studentId: 'you-' + Date.now(), name: 'Your Write' } }],
        oldToken
      );
      
      await refreshAll();
      await refreshLiveQuery();
      
      if (isConflict(appendResult)) {
        const conflictEvent = appendResult.conflictingEvents[0];
        showScenarioResult(
          `⚠️ CONFLICT DETECTED!\n\n` +
          `Event #${conflictEvent.position} (${conflictEvent.type}) kam dazwischen, während du gelesen hast.\n\n` +
          `Dein Token war bei Position #${posAtRead}, aber jetzt gibt es Event #${conflictEvent.position}.\n\n` +
          `➡️ DCB verhindert verlorene Updates. Du musst neu lesen und entscheiden.`,
          'conflict'
        );
      } else {
        showScenarioResult(`✅ Event #${appendResult.position} (kein Conflict - ungewöhnlich)`, 'success');
      }
    };
    
    function showScenarioResult(text, type) {
      const el = document.getElementById('scenario-result');
      el.style.display = 'block';
      el.textContent = text;
      el.className = 'feedback ' + type;
    }
    
    function sleep(ms) {
      return new Promise(r => setTimeout(r, ms));
    }

    // ==================== LIVE QUERY ====================
    
    window.setLiveQuery = function(conditions, btn) {
      // Update conditions in UI
      const container = document.getElementById('live-conditions');
      container.innerHTML = conditions.map((c, i) => `
        <div class="condition-row">
          <input type="text" placeholder="Type" class="cond-type" value="${c.type}">
          <input type="text" placeholder="Key" class="cond-key" value="${c.key}">
          <input type="text" placeholder="Value" class="cond-value" value="${c.value}">
          <button onclick="${i === 0 ? 'addLiveConditionRow()' : 'this.parentElement.remove(); refreshLiveQuery()'}">${i === 0 ? '+' : '-'}</button>
        </div>
      `).join('');
      
      // Update active button
      document.querySelectorAll('.query-presets button').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      
      currentLiveConditions = conditions;
      refreshLiveQuery();
    };

    window.addLiveConditionRow = function() {
      const container = document.getElementById('live-conditions');
      const row = document.createElement('div');
      row.className = 'condition-row';
      row.innerHTML = `
        <input type="text" placeholder="Type" class="cond-type">
        <input type="text" placeholder="Key" class="cond-key">
        <input type="text" placeholder="Value" class="cond-value">
        <button onclick="this.parentElement.remove(); refreshLiveQuery()">-</button>
      `;
      container.appendChild(row);
    };

    window.refreshLiveQuery = async function() {
      if (!store) return;

      // Get conditions from UI
      const rows = document.querySelectorAll('#live-conditions .condition-row');
      const conditions = [];
      for (const row of rows) {
        const type = row.querySelector('.cond-type').value.trim();
        const key = row.querySelector('.cond-key').value.trim();
        const value = row.querySelector('.cond-value').value.trim();
        if (type && key && value) conditions.push({ type, key, value });
      }
      
      if (!conditions.length) {
        document.getElementById('live-count').textContent = '0';
        document.getElementById('live-token').textContent = 'Token: —';
        document.getElementById('live-events').innerHTML = '<div style="color:#666;text-align:center;padding:2rem">No query conditions</div>';
        return;
      }
      
      currentLiveConditions = conditions;
      
      try {
        const result = await store.read({ conditions });
        
        currentLiveToken = result.token;
        document.getElementById('live-count').textContent = result.events.length;
        document.getElementById('live-token').textContent = `Token: ${result.token.substring(0, 20)}...`;
        
        // Get keys for each event
        const allKeys = await storage.getAllKeys();
        const keysByPos = {};
        for (const k of allKeys) {
          if (!keysByPos[k.position]) keysByPos[k.position] = [];
          keysByPos[k.position].push(k);
        }
        
        // Render events (newest first)
        const events = [...result.events].reverse();
        document.getElementById('live-events').innerHTML = events.map(e => {
          const eventKeys = keysByPos[Number(e.position)] || [];
          return `
            <div class="live-event-card">
              <span class="pos">#${e.position}</span>
              <span class="type">${e.type}</span>
              <span class="time">${new Date(e.timestamp).toLocaleTimeString()}</span>
              <div class="data">${JSON.stringify(e.data, null, 2)}</div>
              <div class="keys">
                ${eventKeys.map(k => `<span><span class="kn">${k.key_name}</span>: <span class="kv">${k.key_value}</span></span>`).join('')}
              </div>
            </div>
          `;
        }).join('') || '<div style="color:#666;text-align:center;padding:2rem">No events match query</div>';
        
      } catch (err) {
        document.getElementById('live-events').innerHTML = `<div style="color:#f66;padding:1rem">${err.message}</div>`;
      }
    };

    window.copyLiveToken = function() {
      if (currentLiveToken) {
        navigator.clipboard.writeText(currentLiveToken);
        document.getElementById('live-token').textContent = '✅ Copied!';
        setTimeout(() => {
          document.getElementById('live-token').textContent = `Token: ${currentLiveToken.substring(0, 20)}...`;
        }, 1000);
      }
    };

    window.clearStore = async function() {
      if (!confirm('Alle Events löschen?')) return;
      await storage.clear();
      await refreshAll();
      await refreshLiveQuery();
    };

    // Token handling
    let appendToken = null;

    window.loadFromLiveQuery = function() {
      if (!currentLiveToken) {
        setTokenStatus('❌ Keine Live Query aktiv', 'error');
        return;
      }
      
      // Decode token payload
      try {
        const [payloadB64] = currentLiveToken.split('.');
        const payload = JSON.parse(atob(payloadB64.replace(/-/g,'+').replace(/_/g,'/')));
        document.getElementById('token-payload').value = JSON.stringify(payload, null, 2);
        appendToken = currentLiveToken;
        setTokenStatus(`✅ Token geladen (pos=${payload.pos})`, 'success');
      } catch (e) {
        setTokenStatus('❌ Token decode error: ' + e.message, 'error');
      }
    };

    window.clearAppendToken = function() {
      appendToken = null;
      document.getElementById('token-payload').value = '';
      setTokenStatus('Token gelöscht (nächster Append ohne Check)', 'info');
    };

    function setTokenStatus(msg, type) {
      const el = document.getElementById('token-status');
      el.textContent = msg;
      el.style.color = type === 'error' ? '#f66' : type === 'success' ? '#6f6' : '#888';
    }

    window.appendEvent = async function() {
      if (!store) {
        showFeedback('append-result', 'Store not initialized', 'conflict');
        return;
      }

      const type = document.getElementById('append-type').value.trim();
      const dataStr = document.getElementById('append-data').value.trim();
      
      if (!type) {
        showFeedback('append-result', 'Type required', 'conflict');
        return;
      }
      
      let data;
      try { data = JSON.parse(dataStr || '{}'); }
      catch { return showFeedback('append-result', 'Invalid JSON', 'conflict'); }
      
      try {
        const result = await store.append([{ type, data }], appendToken);
        
        if (isConflict(result)) {
          const conflictEvent = result.conflictingEvents[0];
          showFeedback('append-result', 
            `⚠️ CONFLICT!\nEvent #${conflictEvent.position} (${conflictEvent.type}) kam dazwischen während du gelesen hast.\n\nToken wurde aktualisiert - retry möglich.`, 
            'conflict'
          );
          // Update token to new one for retry
          appendToken = result.newToken;
          try {
            const [payloadB64] = result.newToken.split('.');
            const payload = JSON.parse(atob(payloadB64.replace(/-/g,'+').replace(/_/g,'/')));
            document.getElementById('token-payload').value = JSON.stringify(payload, null, 2);
            setTokenStatus(`⚠️ Neuer Token (pos=${payload.pos}) - retry möglich`, 'error');
          } catch {}
        } else {
          showFeedback('append-result', `✅ Event #${result.position} erfolgreich gespeichert!`, 'success');
          // Clear token after successful append
          appendToken = null;
          document.getElementById('token-payload').value = '';
          setTokenStatus('Token gelöscht', 'info');
        }

        await refreshAll();
        await refreshLiveQuery();
      } catch (err) {
        showFeedback('append-result', `Error: ${err.message}`, 'conflict');
      }
    };

    function showFeedback(id, text, type) {
      const el = document.getElementById(id);
      el.style.display = 'block';
      el.textContent = text;
      el.className = 'feedback ' + type;
    }

    // Quick Actions - directly append
    window.quickAction = async function(type, data) {
      if (!store) {
        showFeedback('quick-result', 'Store not initialized', 'conflict');
        return;
      }

      try {
        const result = await store.append([{ type, data }], null);
        
        if (isConflict(result)) {
          showFeedback('quick-result', `⚠️ Conflict!`, 'conflict');
        } else {
          const description = type === 'CourseCreated' 
            ? `Kurs ${data.courseId} erstellt`
            : type === 'StudentSubscribed'
            ? `${data.name} zu ${data.courseId} hinzugefügt`
            : `${data.studentId} von ${data.courseId} entfernt`;
          showFeedback('quick-result', `✅ Event #${result.position}: ${description}`, 'success');
        }

        await refreshAll();
        await refreshLiveQuery();
      } catch (err) {
        showFeedback('quick-result', `Error: ${err.message}`, 'conflict');
      }
    };

    // Initialize on load
    initStore();
  </script>
</body>
</html>
