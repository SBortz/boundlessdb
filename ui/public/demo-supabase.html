<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>BoundlessDB - Supabase PostgreSQL Demo</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            line-height: 1.4;
            min-height: 100vh;
            padding: 1rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #0f3460;
        }

        h1 {
            color: #0ff;
            font-size: 1.5rem;
        }

        .badge {
            background: #0f3460;
            color: #0cf;
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.8rem;
        }

        .config-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            padding: 1rem;
            background: #16213e;
            border-radius: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .config-bar label {
            color: #888;
            font-size: 0.85rem;
        }

        .config-bar input {
            background: #0d1929;
            border: 1px solid #0f3460;
            color: #eee;
            padding: 0.5rem;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.85rem;
        }

        .config-bar input.url {
            width: 400px;
        }

        .config-bar input.key {
            width: 250px;
        }

        .status {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #666;
        }

        .status-dot.connected {
            background: #0f0;
        }

        .status-dot.error {
            background: #f00;
        }

        .grid {
            display: grid;
            grid-template-columns: 350px 1fr 300px;
            gap: 1rem;
            height: calc(100vh - 180px);
        }

        @media (max-width: 1200px) {
            .grid {
                grid-template-columns: 1fr;
                height: auto;
            }

            .panel {
                max-height: 400px;
            }
        }

        .panel {
            background: #16213e;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 0.75rem 1rem;
            background: #0f3460;
            font-weight: 600;
            color: #0cf;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        button {
            background: linear-gradient(135deg, #0f4c75, #1e5f74);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: transform 0.1s;
        }

        button:hover {
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background: transparent;
            border: 1px solid #0cf;
            color: #0cf;
        }

        button.small {
            padding: 0.25rem 0.5rem;
            font-size: 0.75rem;
        }

        button.success {
            background: linear-gradient(135deg, #0a5c36, #0d7a4a);
        }

        .quick-actions {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .action-group {
            border: 1px solid #0f3460;
            border-radius: 6px;
            padding: 0.5rem;
        }

        .action-group-title {
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 0.5rem;
        }

        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.25rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            color: #888;
            font-size: 0.8rem;
            margin-bottom: 0.25rem;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            background: #0d1929;
            border: 1px solid #0f3460;
            color: #eee;
            padding: 0.5rem;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.85rem;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .event-item {
            background: #0d1929;
            border-radius: 4px;
            padding: 0.5rem;
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
        }

        .event-item .type {
            color: #ff9e64;
            font-weight: 600;
        }

        .event-item .pos {
            color: #666;
            float: right;
        }

        .event-item .data {
            color: #9ece6a;
            margin-top: 0.25rem;
            font-family: monospace;
            font-size: 0.75rem;
        }

        .key-item {
            display: flex;
            gap: 0.5rem;
            padding: 0.25rem 0.5rem;
            font-size: 0.75rem;
            border-bottom: 1px solid #0f3460;
        }

        .key-item .name {
            color: #7aa2f7;
        }

        .key-item .value {
            color: #9ece6a;
        }

        .key-item .pos {
            color: #666;
            margin-left: auto;
        }

        .token-display {
            background: #0d1929;
            border: 1px solid #0f3460;
            border-radius: 4px;
            padding: 0.5rem;
            font-family: monospace;
            font-size: 0.7rem;
            word-break: break-all;
            max-height: 100px;
            overflow-y: auto;
        }

        .token-display.stale {
            border-color: #f90;
            background: rgba(255, 153, 0, 0.1);
        }

        .result-box {
            background: #0d1929;
            border-radius: 4px;
            padding: 0.75rem;
            margin-top: 0.5rem;
        }

        .result-box.success {
            border-left: 3px solid #0f0;
        }

        .result-box.error {
            border-left: 3px solid #f00;
        }

        .result-box.conflict {
            border-left: 3px solid #f90;
        }

        .debug-log {
            font-family: monospace;
            font-size: 0.7rem;
            background: #0a1628;
            padding: 0.5rem;
            height: 100%;
            overflow-y: auto;
        }

        .debug-log .entry {
            margin-bottom: 0.25rem;
        }

        .debug-log .time {
            color: #666;
        }

        .debug-log .info {
            color: #0cf;
        }

        .debug-log .success {
            color: #0f0;
        }

        .debug-log .error {
            color: #f00;
        }

        .debug-log .warn {
            color: #f90;
        }

        .back-link {
            color: #0cf;
            text-decoration: none;
            font-size: 0.85rem;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div>
            <a class="back-link" href="/">← Back to Home</a>
            <h1>🗃️ BoundlessDB <span class="badge">PostgreSQL via Supabase</span></h1>
        </div>
        <div class="status">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Not connected</span>
        </div>
    </header>

    <div class="config-bar">
        <div>
            <label>Supabase URL</label><br>
            <input class="url" id="supabaseUrl" placeholder="https://xxx.supabase.co/functions/v1"
                   type="text"
                   value="https://pjoakbhdcbpwvmxyrfjz.supabase.co/functions/v1">
        </div>
        <div>
            <label>API Key</label><br>
            <input class="key" id="apiKey" placeholder="your-api-key"
                   type="password"
                   value="boundless-demo-api-key-2026">
        </div>
        <button onclick="connect()">Connect</button>
    </div>

    <div class="grid">
        <!-- Left: Actions -->
        <div class="panel">
            <div class="panel-header">
                ⚡ Actions
                <button class="small secondary" onclick="clearAll()">Clear DB</button>
            </div>
            <div class="panel-content">
                <div class="quick-actions">
                    <div class="action-group">
                        <div class="action-group-title">🎓 Create Course</div>
                        <div class="action-buttons">
                            <button class="small" onclick="createCourse('CS101', 30)">CS101 (cap: 30)</button>
                            <button class="small" onclick="createCourse('MATH201', 25)">MATH201 (cap: 25)</button>
                        </div>
                    </div>

                    <div class="action-group">
                        <div class="action-group-title">👤 Enroll Student</div>
                        <div class="action-buttons">
                            <button class="small" onclick="enrollStudent('alice', 'CS101')">Alice → CS101</button>
                            <button class="small" onclick="enrollStudent('bob', 'CS101')">Bob → CS101</button>
                            <button class="small" onclick="enrollStudent('carol', 'CS101')">Carol → CS101</button>
                            <button class="small" onclick="enrollStudent('alice', 'MATH201')">Alice → MATH201</button>
                            <button class="small" onclick="enrollStudent('bob', 'MATH201')">Bob → MATH201</button>
                        </div>
                    </div>
                </div>

                <hr style="margin: 1rem 0; border-color: #0f3460;">

                <h3>📝 Manual Append</h3>
                <div class="form-group">
                    <label>Event Type</label>
                    <select id="eventType">
                        <option value="CourseCreated">CourseCreated</option>
                        <option value="StudentSubscribed">StudentSubscribed</option>
                        <option value="StudentUnsubscribed">StudentUnsubscribed</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Data (JSON)</label>
                    <textarea id="eventData">{"courseId": "CS101", "name": "Intro to CS", "capacity": 30}</textarea>
                </div>
                <div class="form-group">
                    <label>🎫 Token (from Read)</label>
                    <div class="token-display" id="currentToken">No token - click "Read First" or do a Read query</div>
                </div>
                <button class="success" onclick="appendEvent()" style="width: 100%;">Append Event</button>

                <div id="appendResult"></div>
            </div>
        </div>

        <!-- Middle: Events & Read -->
        <div class="panel">
            <div class="panel-header">
                📋 Events
                <div>
                    <button class="small" onclick="refreshEvents()">Refresh</button>
                    <span id="eventCount" style="margin-left: 0.5rem; color: #888;">0 events</span>
                </div>
            </div>
            <div class="panel-content">
                <div class="form-group" style="margin-bottom: 0.5rem;">
                    <label>🔍 Read Query (conditions)</label>
                    <textarea id="readConditions" style="min-height: 60px;">[{"type": "CourseCreated", "key": "course", "value": "CS101"}]</textarea>
                </div>
                <button onclick="readEvents()" style="margin-bottom: 1rem;">Read & Get Token</button>

                <div id="eventsList"></div>
            </div>
        </div>

        <!-- Right: Debug -->
        <div class="panel">
            <div class="panel-header">
                🔧 Debug Log
                <button class="small secondary" onclick="clearLog()">Clear</button>
            </div>
            <div class="panel-content" style="padding: 0;">
                <div class="debug-log" id="debugLog"></div>
            </div>
        </div>
    </div>
</div>

<script>
    let baseUrl = '';
    let apiKey = '';
    let currentToken = null;
    let lastPosition = 0;

    // Debug logging
    function log(msg, type = 'info') {
        const logEl = document.getElementById('debugLog');
        const time = new Date().toLocaleTimeString();
        logEl.innerHTML += `<div class="entry"><span class="time">${time}</span> <span class="${type}">${msg}</span></div>`;
        logEl.scrollTop = logEl.scrollHeight;
    }

    function clearLog() {
        document.getElementById('debugLog').innerHTML = '';
    }

    // API calls
    async function apiCall(endpoint, method = 'GET', body = null) {
        const url = `${baseUrl}/${endpoint}`;
        log(`${method} ${endpoint}`, 'info');

        const options = {
            method,
            headers: {
                'X-API-Key': apiKey,
                'Content-Type': 'application/json'
            }
        };

        if (body) {
            options.body = JSON.stringify(body);
            log(`Body: ${JSON.stringify(body).substring(0, 100)}...`, 'info');
        }

        try {
            const res = await fetch(url, options);
            const data = await res.json();

            if (!res.ok) {
                log(`Error: ${data.error?.message || res.statusText}`, 'error');
                throw new Error(data.error?.message || 'API Error');
            }

            log(`Response: ${JSON.stringify(data).substring(0, 100)}...`, 'success');
            return data;
        } catch (e) {
            log(`Fetch error: ${e.message}`, 'error');
            throw e;
        }
    }

    // Connect
    async function connect() {
        baseUrl = document.getElementById('supabaseUrl').value.replace(/\/$/, '');
        apiKey = document.getElementById('apiKey').value;

        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        try {
            log('Connecting to Supabase...', 'info');
            const health = await apiCall('boundless-health');

            statusDot.className = 'status-dot connected';
            statusText.textContent = `Connected (DB: ${health.database})`;
            log(`Connected! Version: ${health.version}`, 'success');

            await refreshEvents();
        } catch (e) {
            statusDot.className = 'status-dot error';
            statusText.textContent = 'Connection failed';
            log(`Connection failed: ${e.message}`, 'error');
        }
    }

    // Refresh events
    async function refreshEvents() {
        try {
            const data = await apiCall('boundless-events');
            lastPosition = data.events.length > 0 ? Math.max(...data.events.map(e => e.position)) : 0;

            document.getElementById('eventCount').textContent = `${data.total} events`;

            const listEl = document.getElementById('eventsList');
            listEl.innerHTML = data.events.reverse().map(e => `
          <div class="event-item">
            <span class="type">${e.type}</span>
            <span class="pos">#${e.position}</span>
            <div class="data">${typeof e.data === 'string' ? e.data : JSON.stringify(e.data)}</div>
          </div>
        `).join('');

        } catch (e) {
            document.getElementById('eventsList').innerHTML = `<div class="result-box error">Error: ${e.message}</div>`;
        }
    }

    // Read events with conditions
    async function readEvents() {
        try {
            const conditions = JSON.parse(document.getElementById('readConditions').value);
            const data = await apiCall('boundless-read', 'POST', {conditions});

            currentToken = data.token;
            updateTokenDisplay();

            document.getElementById('eventsList').innerHTML = `
          <div class="result-box success">
            Found ${data.events.length} event(s) matching query
          </div>
        ` + data.events.map(e => `
          <div class="event-item">
            <span class="type">${e.type}</span>
            <span class="pos">#${e.position}</span>
            <div class="data">${typeof e.data === 'string' ? e.data : JSON.stringify(e.data)}</div>
          </div>
        `).join('');

            log(`Read returned ${data.events.length} events + token`, 'success');
        } catch (e) {
            document.getElementById('eventsList').innerHTML = `<div class="result-box error">Error: ${e.message}</div>`;
        }
    }

    function updateTokenDisplay() {
        const tokenEl = document.getElementById('currentToken');
        if (currentToken) {
            tokenEl.textContent = currentToken;
            tokenEl.className = 'token-display';

            // Parse token to check position
            try {
                const payload = JSON.parse(atob(currentToken.split('.')[0]));
                if (payload.pos < lastPosition) {
                    tokenEl.className = 'token-display stale';
                    tokenEl.textContent = `⚠️ Token stale (pos ${payload.pos} < ${lastPosition})\n\n${currentToken}`;
                }
            } catch (e) {
            }
        } else {
            tokenEl.textContent = 'No token - do a Read query first';
        }
    }

    // Append event
    async function appendEvent() {
        const type = document.getElementById('eventType').value;
        const data = JSON.parse(document.getElementById('eventData').value);
        const resultEl = document.getElementById('appendResult');

        try {
            const body = {
                events: [{type, data}],
                token: currentToken
            };

            const result = await apiCall('boundless-append', 'POST', body);

            if (result.conflict) {
                resultEl.innerHTML = `
            <div class="result-box conflict">
              ⚠️ CONFLICT detected!<br>
              ${result.conflictingEvents?.length || 0} event(s) added since your read.<br>
              <small>Use the new token to retry.</small>
            </div>
          `;
                currentToken = result.newToken;
                log(`Conflict! ${result.conflictingEvents?.length} events since read`, 'warn');
            } else {
                resultEl.innerHTML = `
            <div class="result-box success">
              ✅ Event appended at position ${result.position}
            </div>
          `;
                currentToken = result.token;
                lastPosition = result.position;
                log(`Appended at position ${result.position}`, 'success');
            }

            updateTokenDisplay();
            await refreshEvents();

        } catch (e) {
            resultEl.innerHTML = `<div class="result-box error">Error: ${e.message}</div>`;
        }
    }

    // Quick actions
    async function createCourse(courseId, capacity) {
        document.getElementById('eventType').value = 'CourseCreated';
        document.getElementById('eventData').value = JSON.stringify({
            courseId,
            name: `${courseId} Course`,
            capacity
        }, null, 2);

        // Read first to get token
        document.getElementById('readConditions').value = JSON.stringify([
            {type: 'CourseCreated', key: 'course', value: courseId}
        ]);
        await readEvents();
    }

    async function enrollStudent(studentId, courseId) {
        document.getElementById('eventType').value = 'StudentSubscribed';
        document.getElementById('eventData').value = JSON.stringify({
            courseId,
            studentId
        }, null, 2);

        // Read first to get token
        document.getElementById('readConditions').value = JSON.stringify([
            {type: 'CourseCreated', key: 'course', value: courseId},
            {type: 'StudentSubscribed', key: 'course', value: courseId}
        ]);
        await readEvents();
    }

    async function clearAll() {
        if (!confirm('Clear all events? This cannot be undone.')) return;

        try {
            // Note: This would need a clear endpoint - for now just log
            log('Clear not implemented yet - use Supabase Dashboard', 'warn');
            alert('Clear not implemented in Edge Functions. Use Supabase Dashboard to truncate tables.');
        } catch (e) {
            log(`Clear failed: ${e.message}`, 'error');
        }
    }

    // Auto-connect on load
    window.onload = () => {
        log('BoundlessDB Supabase Demo loaded', 'info');
        log('Click "Connect" to start', 'info');
    };
</script>
</body>
</html>
